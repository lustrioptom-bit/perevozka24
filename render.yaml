services:
  - type: web
    name: perevozka24
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && chmod +x build.sh && ./build.sh
    startCommand: python app.py
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS_RAW
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PUBLIC_URL
        generateValue: true
      - key: WEBAPP_SECRET_KEY
        generateValue: true
